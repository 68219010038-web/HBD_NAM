<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Happy Birthday! 🎉</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* Animated Background Effects */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: rise 8s infinite ease-in;
        }

        @keyframes rise {
            0% {
                bottom: -100px;
                opacity: 0.5;
            }
            100% {
                bottom: 100vh;
                opacity: 0;
            }
        }

        .light-orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0));
            filter: blur(30px);
            animation: orb-float 6s ease-in-out infinite;
        }

        @keyframes orb-float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(100px, 50px); }
        }

        .wrapper {
            width: 100%;
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        .header h1 {
            font-size: 4em;
            color: white;
            text-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.4),
                0 0 30px rgba(255, 105, 180, 0.5);
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .confetti {
            display: inline-block;
            margin: 0 15px;
            font-size: 3em;
            animation: pulse 1.5s ease-in-out infinite, bounce 2s ease-in-out infinite;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.3),
                0 0 40px rgba(255, 105, 180, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            margin-bottom: 20px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
        }

        .image-container {
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.3),
                0 0 40px rgba(240, 147, 251, 0.4),
                inset 0 1px 10px rgba(255, 255, 255, 0.3);
            margin-bottom: 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 12px;
            width: 100%;
            max-width: 750px;
            animation: pulse 4s ease-in-out infinite;
        }

        #slide {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 20px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            object-fit: cover;
            filter: brightness(1) contrast(1);
        }

        #slide:hover {
            transform: scale(1.02);
            filter: brightness(1.05) contrast(1.1);
        }

        .image-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9), rgba(240, 147, 251, 0.9));
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.1em;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .music-player {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9), rgba(240, 147, 251, 0.9));
            border-radius: 30px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 600px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .music-icon {
            font-size: 1.8em;
            animation: bounce 1s ease-in-out infinite;
        }

        .music-icon span {
            display: inline-block;
            animation: bounce 1s ease-in-out infinite;
        }

        .music-icon span:nth-child(1) {
            animation-delay: 0s;
        }

        .music-icon span:nth-child(2) {
            animation-delay: 0.1s;
        }

        .music-icon span:nth-child(3) {
            animation-delay: 0.2s;
        }

        .hidden-audio {
            display: none;
        }

        .music-label {
            color: white;
            font-weight: 600;
            font-size: 0.95em;
            white-space: nowrap;
        }

        .play-button {
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #667eea;
        }

        .play-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        button {
            padding: 18px 45px;
            font-size: 1.2em;
            font-family: 'Prompt', sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                0 15px 35px rgba(102, 126, 234, 0.4),
                0 0 25px rgba(102, 126, 234, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 25px 50px rgba(102, 126, 234, 0.6),
                0 0 40px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
        }

        button:active {
            transform: translateY(-2px) scale(1.02);
        }

        .btn-prev {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 
                0 15px 35px rgba(240, 147, 251, 0.4),
                0 0 25px rgba(240, 147, 251, 0.2);
        }

        .btn-prev:hover {
            background: linear-gradient(135deg, #f5576c 0%, #ffa502 100%);
            box-shadow: 
                0 25px 50px rgba(240, 147, 251, 0.6),
                0 0 40px rgba(240, 147, 251, 0.4);
        }

        .btn-next {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 
                0 15px 35px rgba(79, 172, 254, 0.4),
                0 0 25px rgba(79, 172, 254, 0.2);
        }

        .btn-next:hover {
            background: linear-gradient(135deg, #00f2fe 0%, #43e97b 100%);
            box-shadow: 
                0 25px 50px rgba(79, 172, 254, 0.6),
                0 0 40px rgba(79, 172, 254, 0.4);
        }

        .footer {
            text-align: center;
            color: white;
            font-size: 1.2em;
            text-shadow: 
                0 2px 10px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(255, 255, 255, 0.2);
            font-weight: 600;
            margin-top: 20px;
            letter-spacing: 1px;
            animation: twinkle 2s ease-in-out infinite;
        }

        .decorative-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 2;
        }

        .particle {
            position: absolute;
            font-size: 2.5em;
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.8em;
            }

            .card {
                padding: 30px;
                border-radius: 30px;
            }

            .image-container {
                border-radius: 20px;
                padding: 10px;
                margin-bottom: 30px;
            }

            button {
                padding: 14px 35px;
                font-size: 1em;
            }

            .confetti {
                font-size: 2.2em;
                margin: 0 8px;
            }

            .footer {
                font-size: 1em;
            }

            .music-player {
                padding: 12px 20px;
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2em;
                letter-spacing: 1px;
            }

            .card {
                padding: 20px;
            }

            .image-container {
                margin-bottom: 20px;
                padding: 8px;
            }

            button {
                padding: 12px 28px;
                font-size: 0.95em;
                gap: 6px;
            }

            .confetti {
                font-size: 1.8em;
                margin: 0 5px;
            }

            .image-counter {
                padding: 10px 15px;
                font-size: 0.9em;
                top: 15px;
                right: 15px;
            }

            .footer {
                font-size: 0.9em;
            }

            .controls {
                gap: 10px;
            }

            .music-player {
                flex-direction: column;
                padding: 12px 15px;
            }

            .music-label {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation" id="bgAnimation"></div>
    <div class="decorative-elements" id="decorativeElements"></div>

    <div class="wrapper">
        <div class="header">
            <h1><span class="confetti">🎉</span> Happy Birthday! <span class="confetti">🎂</span></h1>
        </div>

        <div class="card">
            <div class="music-player">
                <div class="music-icon">
                    <span>♪</span><span>♪</span><span>♪</span>
                </div>
                <audio id="birthdayAudio" class="hidden-audio" loop>
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                </audio>
                <div class="music-label">Happy Birthday Song</div>
                <button class="play-button" id="playBtn" onclick="toggleAudio()">▶ เล่นเพลง</button>
            </div>

            <div class="image-container">
                <img id="slide" src="128.png.png" alt="Birthday Image">
                <div class="image-counter">
                    <span id="current">1</span> / <span id="total">3</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn-prev" onclick="prevImage()">
                    <span>⬅</span> ก่อนหน้า
                </button>
                <button class="btn-next" onclick="nextImage()">
                    ถัดไป <span>➡</span>
                </button>
            </div>
        </div>

        <div class="footer">
            ✨ มีความสุขในวันพิเศษของคุณ ✨
        </div>
    </div>

    <script>
        const images = [
            "128.png.png",
            "138.png.png",
            "148.png.png"
        ];

        let current = 0;
        let isPlaying = false;

        // Load and play Happy Birthday song from free online source
        const audio = document.getElementById('birthdayAudio');
        const playBtn = document.getElementById('playBtn');

        // Array of free Happy Birthday music sources
        const hbdSources = [
            'https://assets.mixkit.co/active_storage/sfx/2848/2848-preview.mp3', // Mixkit - Birthday Celebration
            'https://cdn.pixabay.com/download/audio/2022/03/15/audio_d3e46e18f6.mp3', // Pixabay - Birthday Song
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' // Fallback
        ];

        // Try to load Happy Birthday from multiple sources
        function loadBirthdayAudio() {
            audio.src = hbdSources[0];
        }

        function toggleAudio() {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶ เล่นเพลง';
                isPlaying = false;
            } else {
                loadBirthdayAudio();
                audio.play().catch(err => {
                    console.log('Autoplay prevented, please click play button');
                    playBtn.textContent = '⏸ หยุด';
                    isPlaying = true;
                });
                playBtn.textContent = '⏸ หยุด';
                isPlaying = true;
            }
        }

        // Auto-play on page load (might be blocked by browser)
        window.addEventListener('load', () => {
            setTimeout(() => {
                loadBirthdayAudio();
                audio.play().catch(() => {
                    console.log('Autoplay blocked by browser');
                });
            }, 500);
        });

        audio.addEventListener('play', () => {
            isPlaying = true;
            playBtn.textContent = '⏸ หยุด';
        });

        audio.addEventListener('pause', () => {
            isPlaying = false;
            playBtn.textContent = '▶ เล่นเพลง';
        });

        function updateDisplay() {
            document.getElementById("slide").src = images[current];
            document.getElementById("current").textContent = current + 1;
        }

        function nextImage() {
            current++;
            if (current >= images.length) {
                current = 0;
            }
            updateDisplay();
        }

        function prevImage() {
            current--;
            if (current < 0) {
                current = images.length - 1;
            }
            updateDisplay();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        });

        // Generate decorative particles
        function createParticles() {
            const elements = document.getElementById('decorativeElements');
            const particles = ['🎈', '🎊', '✨', '🎁', '🌟', '🎀', '🧨'];
            
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = particles[Math.floor(Math.random() * particles.length)];
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.fontSize = (Math.random() * 1.5 + 1.5) + 'em';
                elements.appendChild(particle);
            }
        }

        // Generate animated bubbles
        function createBubbles() {
            const bgAnimation = document.getElementById('bgAnimation');
            for (let i = 0; i < 6; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.width = (Math.random() * 80 + 30) + 'px';
                bubble.style.height = bubble.style.width;
                bubble.style.animationDuration = (Math.random() * 5 + 8) + 's';
                bubble.style.animationDelay = Math.random() * 2 + 's';
                bgAnimation.appendChild(bubble);
            }
        }

        // Generate light orbs
        function createLightOrbs() {
            const bgAnimation = document.getElementById('bgAnimation');
            for (let i = 0; i < 3; i++) {
                const orb = document.createElement('div');
                orb.className = 'light-orb';
                orb.style.width = (Math.random() * 150 + 100) + 'px';
                orb.style.height = orb.style.width;
                orb.style.left = Math.random() * 100 + '%';
                orb.style.top = Math.random() * 100 + '%';
                orb.style.animationDuration = (Math.random() * 4 + 6) + 's';
                orb.style.animationDelay = Math.random() * 2 + 's';
                bgAnimation.appendChild(orb);
            }
        }

        createParticles();
        createBubbles();
        createLightOrbs();

        // Initialize total count
        document.getElementById("total").textContent = images.length;
    </script>

</body>
</html>
